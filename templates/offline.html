<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SynapseX — Офлайн</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#050a14;
      font-family:'Courier New',monospace;
      color:#e0e0e0;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:20px;
    }
    .container { text-align:center; max-width:400px; }
    .logo { font-size:28px; font-weight:900; color:#b8ff00;
            letter-spacing:6px; margin-bottom:8px; }
    .subtitle { font-size:10px; color:#00e5ff; letter-spacing:3px; margin-bottom:48px; }
    .icon { font-size:64px; margin-bottom:24px; opacity:0.6; }
    h1 { font-size:16px; color:#b8ff00; letter-spacing:3px; margin-bottom:16px; }
    p { font-size:12px; color:#607080; line-height:1.8; margin-bottom:32px; }
    .btn {
      display:inline-block; padding:12px 32px;
      background:transparent; border:1px solid rgba(184,255,0,0.4);
      color:#b8ff00; font-family:'Courier New',monospace;
      font-size:11px; letter-spacing:2px; cursor:pointer;
      text-decoration:none; border-radius:4px;
      transition:background 0.2s;
    }
    .btn:hover { background:rgba(184,255,0,0.1); }
    .pulse {
      width:8px; height:8px; background:#ff4444;
      border-radius:50%; display:inline-block;
      animation:pulse 1.5s infinite; margin-right:8px;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(0.8); }
    }
    .status { font-size:10px; color:#607080; letter-spacing:1px; margin-top:24px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">SYNAPSE X</div>
    <div class="subtitle">QUANTUM TERMINAL</div>
    <div class="icon">📡</div>
    <h1>НЕТ СОЕДИНЕНИЯ</h1>
    <p>
      Для работы с терминалом необходимо<br>
      подключение к интернету.<br>
      Проверь соединение и попробуй снова.
    </p>
    <a href="/terminal" class="btn">ПОВТОРИТЬ ПОДКЛЮЧЕНИЕ</a>
    <div class="status">
      <span class="pulse"></span>UPLINK OFFLINE
    </div>
  </div>
  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      window.location.href = '/terminal';
    });
    document.querySelector('.btn').addEventListener('click', (e) => {
      e.preventDefault();
      if (navigator.onLine) {
        window.location.href = '/terminal';
      } else {
        document.querySelector('.status').textContent = '⚠ Всё ещё офлайн...';
      }
    });
  </script>
</body>
</html>
